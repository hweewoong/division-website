  <main class="corr-page">
    <header class="corr-header">
      <p class="corr-chip">5학년 2학기 · 규칙과 대응</p>
      <h1>내가 만드는 두 양 사이의 대응 관계</h1>
      <p>보고 → 생성하고 → 표로 정리하고 → 식으로 표현하고 → 말로 설명하는 흐름으로 학습해요.</p>
    </header>
    <div id="correspondenceApp"></div>
  </main>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useMemo, useState } = React;

    const PAIR_OPTIONS = [
      {
        id: "starline",
        sourceLabel: "선의 개수",
        targetLabel: "별 개수",
        image: "assets/starline-stars-lines.svg",
        unitType: "starline",
        relationType: "add",
        fixedValue: 1,
        sourceGlyph: "／",
        targetGlyph: "★"
      },
      {
        id: "sunflower",
        sourceLabel: "해바라기",
        targetLabel: "해바라기 노란색 꽃잎",
        image: "assets/해바라기-해바라기 노란색 꽃잎.png",
        unitType: "petal",
        relationType: "multiply",
        sourceGlyph: "🌻",
        targetGlyph: "🌼"
      },
      {
        id: "grape",
        sourceLabel: "포도",
        targetLabel: "포도알",
        image: "assets/포도-포도알.png",
        unitType: "grape",
        relationType: "multiply",
        sourceGlyph: "🍇",
        targetGlyph: "🟣"
      },
      {
        id: "chair",
        sourceLabel: "의자",
        targetLabel: "의자 다리",
        image: "assets/의자-의자 다리.png",
        unitType: "leg",
        relationType: "multiply",
        sourceGlyph: "🪑",
        targetGlyph: "┃"
      },
      {
        id: "crocodile",
        sourceLabel: "악어",
        targetLabel: "악어 이빨",
        image: "assets/악어-악어 이빨.png",
        unitType: "tooth",
        relationType: "multiply",
        sourceGlyph: "🐊",
        targetGlyph: "▲"
      }
    ];

    const SYMBOLS = ["●", "▲", "■", "★", "❤", "⬟"];
    const OPERATORS = ["+", "-", "×", "÷"];

    function randomInt(min, max) {
      return min + Math.floor(Math.random() * (max - min + 1));
    }

    function pickRandomRatio(prev, level) {
      let min = 1;
      let max = 6;
      if (level === "normal") {
        min = 7;
        max = 99;
      } else if (level === "hard") {
        min = 100;
        max = 999;
      } else if (level === "veryHard") {
        min = 1000;
        max = 5999;
      }
      let next = prev;
      let guard = 0;
      while (next === prev && guard < 12) {
        next = randomInt(min, max);
        guard += 1;
      }
      return next;
    }

    function createBaseNumbers() {
      const rest = [];
      const used = new Set([1, 2, 3, 4]);
      while (rest.length < 6) {
        const candidate = randomInt(5, 99);
        if (!used.has(candidate)) {
          used.add(candidate);
          rest.push(candidate);
        }
      }
      rest.sort((a, b) => a - b);
      return [1, 2, 3, 4, ...rest];
    }

    function App() {
      const [selectedPairId, setSelectedPairId] = useState("");
      const [ratio, setRatio] = useState(3);
      const [baseNumbers, setBaseNumbers] = useState(() => createBaseNumbers());
      const [inputValues, setInputValues] = useState(Array(10).fill(""));
      const [tableChecked, setTableChecked] = useState(false);
      const [wrongIndexes, setWrongIndexes] = useState([]);
      const [tableFeedback, setTableFeedback] = useState("");
      const [difficulty, setDifficulty] = useState("easy");
      const [symbolA, setSymbolA] = useState("●");
      const [symbolB, setSymbolB] = useState("▲");
      const [lhsVar, setLhsVar] = useState("target");
      const [rhsVar, setRhsVar] = useState("base");
      const [operator, setOperator] = useState("+");
      const [constant, setConstant] = useState(1);
      const [finalFeedback, setFinalFeedback] = useState("");
      const [finalSentence, setFinalSentence] = useState("");
      const [showCelebrate, setShowCelebrate] = useState(false);

      const selectedPair = PAIR_OPTIONS.find((it) => it.id === selectedPairId);
      const hasPair = !!selectedPair;
      const isAddRelation = selectedPair?.relationType === "add";

      function getTargetValue(baseValue) {
        if (!selectedPair) return 0;
        if (selectedPair.relationType === "add") return baseValue + selectedPair.fixedValue;
        return baseValue * ratio;
      }

      const currentStep = useMemo(() => {
        if (finalSentence) return 4;
        if (tableChecked) return 3;
        if (hasPair) return 2;
        return 1;
      }, [finalSentence, tableChecked, hasPair]);

      function choosePair(id) {
        setFinalSentence("");
        setFinalFeedback("");
        setTableChecked(false);
        setWrongIndexes([]);
        setTableFeedback("");
        setInputValues(Array(10).fill(""));
        setBaseNumbers(createBaseNumbers());
        setShowCelebrate(false);
        setSelectedPairId(id);
        setOperator("+");
        setConstant(1);
        setLhsVar("target");
        setRhsVar("base");
        const nextPair = PAIR_OPTIONS.find((it) => it.id === id);
        if (nextPair?.relationType === "add") {
          setRatio(nextPair.fixedValue);
        } else {
          setRatio(pickRandomRatio(ratio, difficulty));
        }
      }

      function handleGenerate() {
        if (!hasPair) return;
        const next = selectedPair?.relationType === "add"
          ? selectedPair.fixedValue
          : pickRandomRatio(ratio, difficulty);
        setRatio(next);
        setTableChecked(false);
        setWrongIndexes([]);
        setTableFeedback("새로운 수로 생성했어요. 표를 다시 작성해 보세요.");
        setFinalSentence("");
        setFinalFeedback("");
        setInputValues(Array(10).fill(""));
        setBaseNumbers(createBaseNumbers());
      }

      function handleRegenerate() {
        if (!hasPair) return;
        const next = selectedPair?.relationType === "add"
          ? selectedPair.fixedValue
          : pickRandomRatio(ratio, difficulty);
        setRatio(next);
        setTableChecked(false);
        setWrongIndexes([]);
        setTableFeedback("대응 규칙이 바뀌었어요. 표를 다시 확인해 보세요.");
        setFinalSentence("");
        setFinalFeedback("");
        setInputValues(Array(10).fill(""));
        setBaseNumbers(createBaseNumbers());
        setOperator("+");
        setConstant(1);
        setLhsVar("target");
        setRhsVar("base");
      }

      function handleDifficultyChange(level) {
        setDifficulty(level);
        setBaseNumbers(createBaseNumbers());
        setTableChecked(false);
        setWrongIndexes([]);
        setTableFeedback("숫자 범위를 바꿨어요. 표를 새로 채워 보세요.");
        setFinalSentence("");
        setFinalFeedback("");
        setInputValues(Array(10).fill(""));
        if (selectedPair?.relationType === "multiply") {
          setRatio(pickRandomRatio(ratio, level));
        }
      }

      function updateInput(idx, value) {
        const normalized = value.replace(/[^0-9]/g, "");
        const next = inputValues.slice();
        next[idx] = normalized;
        setInputValues(next);
        if (wrongIndexes.includes(idx)) {
          setWrongIndexes(wrongIndexes.filter((v) => v !== idx));
        }
      }

      function checkTableAnswer() {
        if (!hasPair) {
          setTableFeedback("먼저 두 양을 선택해 주세요.");
          return;
        }
        const incorrect = baseNumbers
          .map((num, idx) => (Number(inputValues[idx]) === getTargetValue(num) ? -1 : idx))
          .filter((idx) => idx !== -1);
        const isCorrect = incorrect.length === 0;
        if (isCorrect) {
          setTableChecked(true);
          setWrongIndexes([]);
          setTableFeedback("정답입니다. 이제 아래에서 식으로 표현해 보세요.");
        } else {
          setTableChecked(false);
          setWrongIndexes(incorrect);
          setFinalSentence("");
          setFinalFeedback("");
          setTableFeedback("아직 오답이 있어요. 대응 규칙을 다시 살펴보세요.");
        }
      }

      function evaluateFormula(baseValue, targetValue) {
        const lhs = lhsVar === "target" ? targetValue : baseValue;
        const rhsBase = rhsVar === "target" ? targetValue : baseValue;
        let result = 0;
        if (operator === "+") result = rhsBase + Number(constant);
        if (operator === "-") result = rhsBase - Number(constant);
        if (operator === "×") result = rhsBase * Number(constant);
        if (operator === "÷") result = rhsBase / Number(constant);
        return Math.abs(lhs - result) < 1e-8;
      }

      function checkFinalFormula() {
        if (!tableChecked || !hasPair) {
          setFinalFeedback("먼저 표의 정답을 맞혀서 단계 잠금을 해제해 주세요.");
          return;
        }
        if (operator === "÷" && Number(constant) === 0) {
          setFinalFeedback("0으로 나눌 수 없어요. 다른 수를 넣어 보세요.");
          return;
        }
        const formulaCorrect = [1, 2, 3, 4, 5].every((baseValue) => {
          const targetValue = getTargetValue(baseValue);
          return evaluateFormula(baseValue, targetValue);
        });
        if (!formulaCorrect) {
          setFinalSentence("");
          setFinalFeedback("식을 다시 확인해 보세요. 대응 관계와 맞지 않아요.");
          return;
        }
        setFinalFeedback("최종 정답입니다.");
        setShowCelebrate(true);
        setFinalSentence(
          isAddRelation
            ? `${selectedPair.targetLabel}는 ${selectedPair.sourceLabel}보다 ${selectedPair.fixedValue}개 더 많습니다. ` +
              `${selectedPair.sourceLabel}에 ${selectedPair.fixedValue}을(를) 더하면 ${selectedPair.targetLabel}가 됩니다. ` +
              `${selectedPair.targetLabel}에서 ${selectedPair.fixedValue}을(를) 빼면 ${selectedPair.sourceLabel}가 됩니다.`
            : `${selectedPair.sourceLabel} 1개에 ${selectedPair.targetLabel}이(가) ${ratio}개씩 대응됩니다. ` +
              `${selectedPair.sourceLabel}의 수가 1 늘어날 때마다 ${selectedPair.targetLabel}은(는) ${ratio}개씩 늘어납니다.`
        );
      }

      const lhsSymbol = lhsVar === "target" ? symbolB : symbolA;
      const rhsSymbol = rhsVar === "target" ? symbolB : symbolA;
      const sourceName = selectedPair ? selectedPair.sourceLabel : "기준 양";
      const targetName = selectedPair ? selectedPair.targetLabel : "대응 양";

      function renderStarLineFigure(lineCount) {
        const starCount = lineCount + 1;
        const width = 190;
        const height = 96;
        const step = Math.max(34, Math.floor((width - 34) / Math.max(starCount - 1, 1)));
        const points = Array.from({ length: starCount }, (_, idx) => ({
          x: 18 + idx * step,
          y: idx % 2 === 0 ? 66 : 26
        }));

        return (
          <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} aria-label={`선 ${lineCount}개일 때 별 ${starCount}개`}>
            {Array.from({ length: lineCount }, (_, idx) => (
              <line
                key={`line-${lineCount}-${idx}`}
                x1={points[idx].x}
                y1={points[idx].y}
                x2={points[idx + 1].x}
                y2={points[idx + 1].y}
                stroke="#f59e0b"
                strokeWidth="3.5"
                strokeLinecap="round"
              />
            ))}
            {points.map((p, idx) => (
              <text key={`star-${lineCount}-${idx}`} x={p.x} y={p.y + 8} textAnchor="middle" fontSize="24" fill="#facc15" stroke="#f59e0b" strokeWidth="0.8">
                ★
              </text>
            ))}
          </svg>
        );
      }

      function renderChoiceThumbnail(pair) {
        if (pair.id === "starline") {
          return (
            <svg width="140" height="68" viewBox="0 0 140 68" aria-hidden="true">
              <line x1="8" y1="48" x2="28" y2="24" stroke="#f59e0b" strokeWidth="2.6" strokeLinecap="round" />
              <line x1="28" y1="24" x2="48" y2="48" stroke="#f59e0b" strokeWidth="2.6" strokeLinecap="round" />
              <text x="8" y="54" fontSize="14" fill="#facc15" stroke="#f59e0b" strokeWidth="0.5">★</text>
              <text x="28" y="20" fontSize="14" fill="#facc15" stroke="#f59e0b" strokeWidth="0.5">★</text>
              <text x="48" y="54" fontSize="14" fill="#facc15" stroke="#f59e0b" strokeWidth="0.5">★</text>
              <text x="62" y="40" fontSize="16" fill="#8b5cf6">→</text>
              <line x1="82" y1="48" x2="98" y2="24" stroke="#f59e0b" strokeWidth="2.6" strokeLinecap="round" />
              <line x1="98" y1="24" x2="114" y2="48" stroke="#f59e0b" strokeWidth="2.6" strokeLinecap="round" />
              <line x1="114" y1="48" x2="130" y2="24" stroke="#f59e0b" strokeWidth="2.6" strokeLinecap="round" />
              <text x="82" y="54" fontSize="14" fill="#facc15" stroke="#f59e0b" strokeWidth="0.5">★</text>
              <text x="98" y="20" fontSize="14" fill="#facc15" stroke="#f59e0b" strokeWidth="0.5">★</text>
              <text x="114" y="54" fontSize="14" fill="#facc15" stroke="#f59e0b" strokeWidth="0.5">★</text>
              <text x="130" y="20" fontSize="14" fill="#facc15" stroke="#f59e0b" strokeWidth="0.5">★</text>
            </svg>
          );
        }
        return (
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: "8px", fontSize: "20px", height: "68px" }} aria-hidden="true">
            <span>{pair.sourceGlyph}</span>
            <span style={{ color: "#8b5cf6", fontWeight: 800 }}>→</span>
            <span>{pair.targetGlyph}</span>
            <span>{pair.targetGlyph}</span>
            <span>{pair.targetGlyph}</span>
          </div>
        );
      }

      return (
        <div className="corr-app">
          <section className="corr-panel corr-progress">
            <h2>학습 진행 단계</h2>
            <ol className="corr-progress-list" aria-label="학습 진행 상태">
              {["선택", "표 작성", "식 만들기", "설명 확인"].map((label, idx) => {
                const stepNo = idx + 1;
                const stateClass =
                  currentStep === stepNo ? "is-current" : currentStep > stepNo ? "is-done" : "";
                return (
                  <li key={label} className={`corr-progress-step ${stateClass}`}>
                    <span className="corr-progress-dot">{stepNo}</span>
                    <span>{label}</span>
                  </li>
                );
              })}
            </ol>
          </section>

          <section className="corr-panel corr-board">
            <h2>1) 대응 관계 선택 영역</h2>
            <p className="corr-tip">고정된 대응쌍을 하나 선택한 뒤 생성/재생성으로 관계를 탐색해 보세요.</p>
            <div className="corr-difficulty-row" role="group" aria-label="난이도 선택">
              <button
                type="button"
                className={`corr-difficulty-btn ${difficulty === "easy" ? "is-active" : ""}`}
                onClick={() => handleDifficultyChange("easy")}
              >
                쉬움(1~6)
              </button>
              <button
                type="button"
                className={`corr-difficulty-btn ${difficulty === "normal" ? "is-active" : ""}`}
                onClick={() => handleDifficultyChange("normal")}
              >
                보통(7~99)
              </button>
              <button
                type="button"
                className={`corr-difficulty-btn ${difficulty === "hard" ? "is-active" : ""}`}
                onClick={() => handleDifficultyChange("hard")}
              >
                어려움(100~999)
              </button>
              <button
                type="button"
                className={`corr-difficulty-btn ${difficulty === "veryHard" ? "is-active" : ""}`}
                onClick={() => handleDifficultyChange("veryHard")}
              >
                매우 어려움(1000~5999)
              </button>
            </div>
            <div className="corr-select-grid">
              {PAIR_OPTIONS.map((pair) => (
                <button
                  key={pair.id}
                  type="button"
                  className={`corr-choice corr-choice-pair ${selectedPairId === pair.id ? "is-active" : ""}`}
                  onClick={() => choosePair(pair.id)}
                >
                  <div className="corr-choice-image">{renderChoiceThumbnail(pair)}</div>
                  <span>{pair.sourceLabel} - {pair.targetLabel}</span>
                </button>
              ))}
            </div>
            <div className="corr-action-row">
              <button type="button" className="btn primary" onClick={handleGenerate} disabled={!hasPair}>생성</button>
              <button type="button" className="btn ghost" onClick={handleRegenerate} disabled={!hasPair}>재생성</button>
            </div>
            <div className="corr-stage">
              {!hasPair ? (
                <p className="corr-placeholder">대응쌍을 선택하면 시각화가 시작됩니다.</p>
              ) : (
                <>
                  <p className="corr-rule">
                    {selectedPair.targetLabel}와 {selectedPair.sourceLabel} 사이의 대응
                  </p>
                  <div className="corr-card-wrap">
                    {isAddRelation ? (
                      <div className="corr-object-card" style={{ width: "100%" }}>
                        <div
                          className="corr-object-composite"
                          style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: "10px", flexWrap: "wrap", padding: "12px 10px" }}
                        >
                          {[1, 2, 3, 4].map((lineCount) => (
                            <div key={`starline-${lineCount}`} style={{ display: "grid", justifyItems: "center", gap: "4px" }}>
                              {renderStarLineFigure(lineCount)}
                              <small style={{ fontWeight: 700, color: "#334155" }}>선 {lineCount}개 · 별 {lineCount + 1}개</small>
                            </div>
                          ))}
                          <div style={{ fontSize: "2rem", fontWeight: 800, color: "#64748b", padding: "0 8px" }}>...</div>
                        </div>
                        <p className="corr-sub-caption">
                          선 1개 - 별 2개, 선 2개 - 별 3개, 선 3개 - 별 4개, 선 4개 - 별 5개, ...
                        </p>
                      </div>
                    ) : (
                      <div className="corr-object-card">
                        <div className="corr-object-composite">
                          <img
                            src={selectedPair.image}
                            alt={`${selectedPair.sourceLabel}와 ${selectedPair.targetLabel} 대응`}
                            className="corr-object-main-image"
                          />
                          <div className="corr-attach-zone" aria-hidden="true">
                            {Array.from({ length: ratio }, (_, idx) => (
                              <span key={idx} className={`corr-unit corr-unit-${selectedPair.unitType}`}></span>
                            ))}
                          </div>
                        </div>
                        <p className="corr-sub-caption">{selectedPair.sourceLabel} 1개 - {selectedPair.targetLabel} {ratio}개</p>
                      </div>
                    )}
                  </div>
                </>
              )}
            </div>
          </section>

          <section className="corr-panel">
            <h2>2) 대응 관계 표</h2>
            <p className="corr-tip">아래 표를 채우고 정답 확인을 눌러 보세요.</p>
            <div className="corr-table-shell">
              <table className="corr-table">
                <tbody>
                  <tr>
                    <th>{selectedPair ? selectedPair.sourceLabel : "첫 번째 양"}</th>
                    {baseNumbers.map((num, idx) => <td key={`base-${idx}`}>{num}</td>)}
                  </tr>
                  <tr>
                    <th>{selectedPair ? selectedPair.targetLabel : "두 번째 양"}</th>
                    {inputValues.map((value, idx) => (
                      <td key={`input-${idx}`}>
                        <input
                          className={wrongIndexes.includes(idx) ? "is-wrong" : ""}
                          inputMode="numeric"
                          value={value}
                          onChange={(e) => updateInput(idx, e.target.value)}
                          aria-label={`${idx + 1}번째 대응값 입력`}
                        />
                      </td>
                    ))}
                  </tr>
                </tbody>
              </table>
            </div>
            <div className="corr-action-row">
              <button type="button" className="btn primary" onClick={checkTableAnswer}>정답 확인</button>
            </div>
            <p className={`corr-feedback ${tableChecked ? "is-good" : "is-warn"}`}>{tableFeedback}</p>
          </section>

          <section className={`corr-panel ${tableChecked ? "" : "is-locked"}`}>
            <h2>3) 식으로 표현하기</h2>
            <p className="corr-tip">위에서 고른 양 이름으로 자동 적용됩니다. 기호를 골라 식을 만들고 최종 정답 확인 버튼을 눌러 보세요.</p>
            <div className="corr-formula-grid">
              <label>
                <span className="corr-field-label">기준 기호({sourceName})</span>
                <select value={symbolA} onChange={(e) => setSymbolA(e.target.value)}>
                  {SYMBOLS.map((s) => <option key={s} value={s}>{s}</option>)}
                </select>
              </label>
              <label>
                <span className="corr-field-label">대응 기호({targetName})</span>
                <select value={symbolB} onChange={(e) => setSymbolB(e.target.value)}>
                  {SYMBOLS.map((s) => <option key={s} value={s}>{s}</option>)}
                </select>
              </label>
              <label>
                <span className="corr-field-label">왼쪽 항</span>
                <select value={lhsVar} onChange={(e) => setLhsVar(e.target.value)}>
                  <option value="target">{targetName}</option>
                  <option value="base">{sourceName}</option>
                </select>
              </label>
              <label>
                <span className="corr-field-label">오른쪽 기준항</span>
                <select value={rhsVar} onChange={(e) => setRhsVar(e.target.value)}>
                  <option value="base">{sourceName}</option>
                  <option value="target">{targetName}</option>
                </select>
              </label>
              <label>
                <span className="corr-field-label">연산자</span>
                <select value={operator} onChange={(e) => setOperator(e.target.value)}>
                  {OPERATORS.map((op) => <option key={op} value={op}>{op}</option>)}
                </select>
              </label>
              <label>
                <span className="corr-field-label">수</span>
                <input
                  type="number"
                  min="0"
                  value={constant}
                  onChange={(e) => setConstant(Number(e.target.value || 0))}
                />
              </label>
            </div>
            <p className="corr-formula-preview">
              {lhsSymbol} = {rhsSymbol} {operator} {Number(constant)}
            </p>
            <p className="corr-formula-names">
              ({lhsVar === "target" ? targetName : sourceName}) = ({rhsVar === "target" ? targetName : sourceName}) {operator} {Number(constant)}
            </p>
            <div className="corr-action-row">
              <button type="button" className="btn primary" onClick={checkFinalFormula}>최종 정답 확인</button>
            </div>
            <p className={`corr-feedback ${finalSentence ? "is-good" : "is-warn"}`}>{finalFeedback}</p>
          </section>

          <section className="corr-panel corr-result">
            <h2>4) 결과 출력</h2>
            <p className="corr-tip">최종 정답을 맞히면 자연스러운 설명 문장이 나타납니다.</p>
            <p className="corr-result-box">{finalSentence || "아직 결과가 없어요. 위 단계를 완료해 보세요."}</p>
          </section>

          {showCelebrate && (
            <div className="corr-celebrate-backdrop" role="dialog" aria-modal="true" aria-label="축하 모달">
              <div className="corr-celebrate-modal">
                <div className="corr-sticker-row" aria-hidden="true">
                  <span>🎉</span><span>⭐</span><span>👏</span><span>🍀</span><span>🎊</span>
                </div>
                <h3>완료! 정말 잘했어요</h3>
                <p>대응 관계를 표와 식, 설명 문장까지 모두 완성했어요.</p>
                <button type="button" className="btn primary" onClick={() => setShowCelebrate(false)}>확인</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("correspondenceApp")).render(<App />);
  </script>
</body>
</html>
